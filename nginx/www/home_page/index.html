<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>base_hub 基础底座 - 服务与端口</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <style>
    :root {
      --bg: #0b0f17;
      --bg2: #0f1624;
      --card: #121a2b;
      --card2: #0f192e;
      --text: #e9eef7;
      --muted: #9fb2d1;
      --accent: #4cc2ff;
      --accent2: #7a5cff;
      --line: rgba(255,255,255,0.08);
      --glow: rgba(76,194,255,0.25);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      font-family: "HarmonyOS Sans", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, rgba(76,194,255,0.18), transparent 60%),
        radial-gradient(900px 500px at 90% -20%, rgba(122,92,255,0.20), transparent 55%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      min-height: 100vh;
    }
    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 48px 24px 64px;
    }
    .hero {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 24px;
      align-items: center;
      padding: 28px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(18,26,43,0.8), rgba(15,25,46,0.9));
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      backdrop-filter: blur(6px);
    }
    .title {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: 0.5px;
      margin: 0 0 12px 0;
    }
    .sub {
      color: var(--muted);
      line-height: 1.7;
      margin: 0;
    }
    .meta {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 16px;
    }
    .pill {
      border: 1px solid var(--line);
      padding: 6px 12px;
      border-radius: 999px;
      color: var(--muted);
      background: rgba(255,255,255,0.03);
      font-size: 12px;
    }
    .pill.button {
      cursor: pointer;
      color: var(--text);
      transition: border 0.2s ease, color 0.2s ease, box-shadow 0.2s ease;
    }
    .pill.button:hover {
      border-color: rgba(76,194,255,0.35);
      color: var(--accent);
      box-shadow: 0 0 0 1px rgba(76,194,255,0.25);
    }
    .pill.mono {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0,1fr));
      gap: 12px;
    }
    .stat {
      padding: 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--line);
    }
    .stat .num {
      font-size: 22px;
      font-weight: 700;
    }
    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-top: 4px;
    }
    .section {
      margin-top: 28px;
    }
    .section h2 {
      margin: 0 0 12px 0;
      font-size: 18px;
      color: #cfe2ff;
      letter-spacing: 0.3px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
    }
    .card {
      position: relative;
      border-radius: 18px;
      padding: 20px;
      background: linear-gradient(145deg, rgba(18,26,43,0.8), rgba(15,25,46,0.85));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
      transition: transform 0.35s ease, box-shadow 0.35s ease, border 0.35s ease;
    }
    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 18px 36px rgba(0,0,0,0.35), 0 0 0 1px var(--glow);
      border-color: rgba(76,194,255,0.25);
    }
    .card .name {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
      margin-left: 6px;
    }
    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #64748b;
      box-shadow: 0 0 0 2px rgba(100,116,139,0.2);
    }
    .status.ok .dot { background: #22c55e; box-shadow: 0 0 0 2px rgba(34,197,94,0.25); }
    .status.bad .dot { background: #ef4444; box-shadow: 0 0 0 2px rgba(239,68,68,0.25); }
    .status.warn .dot { background: #f59e0b; box-shadow: 0 0 0 2px rgba(245,158,11,0.25); }
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--muted);
      margin-right: 6px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
    }
    .ports {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }
    .port {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--muted);
      min-width: 0;
    }
    .port > span,
    .port > a,
    .port > button {
      min-width: 0;
      max-width: 100%;
    }
    .port .tag {
      color: var(--text);
      font-weight: 600;
      min-width: 54px;
      flex: 0 0 auto;
    }
    .port .addr {
      color: var(--text);
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      flex: 0 0 auto;
    }
    .port .addr.link:hover {
      color: var(--accent);
      text-decoration: underline;
    }
    .port .desc {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1 1 auto;
      min-width: 0;
    }
    .port .desc .mapping {
      display: inline-block;
      margin-left: 6px;
      padding: 2px 6px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,0.02);
      font-size: 11px;
    }
    .port .desc .mapping::before {
      content: " · ";
    }
    .copy-btn {
      margin-left: auto;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--muted);
      border-radius: 999px;
      padding: 4px 8px;
      font-size: 11px;
      cursor: pointer;
      transition: color 0.2s ease, border 0.2s ease;
    }
    .copy-btn:hover {
      color: var(--accent);
      border-color: rgba(76,194,255,0.35);
    }
    .footer {
      margin-top: 36px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }
    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .stats { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 720px) {
      .port {
        flex-wrap: wrap;
      }
      .port .addr {
        white-space: normal;
        overflow-wrap: anywhere;
        word-break: break-all;
      }
      .port .desc {
        flex-basis: 100%;
      }
      .copy-btn {
        margin-left: 0;
      }
    }
    @media (max-width: 540px) {
      .stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="hero">
      <div>
        <div class="title">base_hub 服务与端口总览</div>
        <p class="sub">聚合基础服务入口与管理端口，统一可视化展示。</p>
        <div class="meta">
          <div class="pill">统一网络: base_hub_net</div>
          <div class="pill" id="host-pill">HOST: <span id="host">-</span></div>
          <button class="pill button" id="refresh-btn" type="button">刷新端口清单</button>
          <div class="pill mono" id="updated-pill">更新时间: -</div>
        </div>
      </div>
      <div class="stats">
        <div class="stat">
          <div class="num" id="svc-count">-</div>
          <div class="label">服务数量</div>
        </div>
        <div class="stat">
          <div class="num" id="port-count">-</div>
          <div class="label">端口总数</div>
        </div>
        <div class="stat">
          <div class="num" id="mgmt-count">-</div>
          <div class="label">管理入口</div>
        </div>
        <div class="stat">
          <div class="num" id="access-count">-</div>
          <div class="label">外部接入</div>
        </div>
      </div>
    </div>

    <div class="section">
      <h2>管理入口</h2>
      <div class="grid" id="mgmt-list"></div>
    </div>

    <div class="section">
      <h2>外部接入</h2>
      <div class="grid" id="access-list"></div>
    </div>

    <div class="footer">base_hub · Infra Portal</div>
  </div>

  <script>
    const host = location.hostname || '<HOST>';
    document.getElementById('host').textContent = host;

    function cardTemplate(service) {
      const serviceId = `${service.name}-${service.category}`.replace(/[^a-zA-Z0-9_-]/g, '');
      const ports = service.ports.map(p => {
        const hostPort = p.host_port || '';
        const containerPort = p.container_port || '';
        const addr = hostPort ? `${host}:${hostPort}` : `-`;
        const mapping = `容器端口:${containerPort || '-'}`;
        const proto = (p.protocol || '').toLowerCase();
        const canOpen = hostPort && ['http', 'https', 'ws', 'wss'].includes(proto);
        const href = canOpen ? `${proto}://${host}:${hostPort}` : '';
        const addrHtml = canOpen
          ? `<a class="addr link" href="${href}" target="_blank" rel="noopener">${addr}</a>`
          : `<span class="addr">${addr}</span>`;
        const copyText = canOpen ? href : `${p.protocol || ''}://${addr} (${mapping})`;
        return `<div class="port">
          <span class="tag">${(p.protocol || '').toUpperCase()}</span>
          ${addrHtml}
          <span class="desc">${p.desc}<span class="mapping">${mapping}</span></span>
          <button class="copy-btn" data-copy="${copyText}">复制</button>
        </div>`;
      }).join('');
      return `
        <div class="card">
          <div class="name">${service.name}
            <span class="status warn" id="status-${serviceId}">
              <span class="dot"></span><span class="text">检测中</span>
            </span>
          </div>
          <div>
            <span class="badge">${service.category === 'management' ? '管理' : '接入'}</span>
            <span class="badge">${service.ports.length} ports</span>
          </div>
          <div class="ports">${ports}</div>
        </div>
      `;
    }

    function checkServiceStatus(service) {
      const serviceId = `${service.name}-${service.category}`.replace(/[^a-zA-Z0-9_-]/g, '');
      const el = document.getElementById(`status-${serviceId}`);
      if (!el) return;
      const ports = (service.ports || []).filter(p => p.host_port);
      const httpPort = ports.find(p => ['http', 'https'].includes((p.protocol || '').toLowerCase()));
      if (!httpPort) {
        el.className = 'status warn';
        el.querySelector('.text').textContent = '未检测';
        return;
      }
      const proto = (httpPort.protocol || 'http').toLowerCase();
      const url = `${proto}://${host}:${httpPort.host_port}`;
      const controller = new AbortController();
      const t = setTimeout(() => controller.abort(), 1500);
      fetch(url, { mode: 'no-cors', signal: controller.signal })
        .then(() => {
          clearTimeout(t);
          el.className = 'status ok';
          el.querySelector('.text').textContent = '可达';
        })
        .catch(() => {
          clearTimeout(t);
          el.className = 'status bad';
          el.querySelector('.text').textContent = '不可达';
        });
    }

    function bindCopyButtons() {
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const text = btn.getAttribute('data-copy') || '';
          try {
            await navigator.clipboard.writeText(text);
            btn.textContent = '已复制';
            setTimeout(() => (btn.textContent = '复制'), 1200);
          } catch {
            const input = document.createElement('textarea');
            input.value = text;
            document.body.appendChild(input);
            input.select();
            document.execCommand('copy');
            document.body.removeChild(input);
            btn.textContent = '已复制';
            setTimeout(() => (btn.textContent = '复制'), 1200);
          }
        });
      });
    }

    function renderServices(data) {
      const services = data.services || [];
      const access = services.filter(s => s.category === 'access');
      const mgmt = services.filter(s => s.category === 'management');
      const portTotal = services.reduce((n, s) => n + (s.ports?.length || 0), 0);
      const generatedAt = data.generated_at || '-';

      document.getElementById('svc-count').textContent = services.length;
      document.getElementById('port-count').textContent = portTotal;
      document.getElementById('mgmt-count').textContent = mgmt.length;
      document.getElementById('access-count').textContent = access.length;
      document.getElementById('updated-pill').textContent = `更新时间: ${generatedAt}`;

      document.getElementById('access-list').innerHTML = access.map(cardTemplate).join('');
      document.getElementById('mgmt-list').innerHTML = mgmt.map(cardTemplate).join('');

      bindCopyButtons();
      services.forEach(checkServiceStatus);
    }

    function loadServices() {
      fetch(`services.json?ts=${Date.now()}`, { cache: 'no-store' })
        .then(r => r.json())
        .then(renderServices)
        .catch(() => {
          document.getElementById('access-list').innerHTML = '<div class="card">读取 services.json 失败</div>';
          document.getElementById('mgmt-list').innerHTML = '<div class="card">读取 services.json 失败</div>';
        });
    }

    document.getElementById('refresh-btn').addEventListener('click', loadServices);
    loadServices();
  </script>
</body>
</html>
