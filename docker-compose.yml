version: "3.8"

services:
  tsdb:
    image: timescale/timescaledb:2.8.0-pg14
    restart: always
    ports:
      - 5432:5432
    networks:
      - project_net
    environment:
      POSTGRES_PASSWORD: uj123456
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./production_data/tsdb:/var/lib/postgresql/data/pgdata
      - ./production_data/share:/mnt/share/
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '500M'
        max-file: '1'
  redis:
    restart: always
    image: redis:6.0.10
    ports:
      - 6379:6379
    volumes:
      - ./production_data/redis/data:/data
    networks:
      - project_net
    command: redis-server --requirepass uj123456 --notify-keyspace-events Ex --appendonly yes --appendfsync everysec
  nginx:
    restart: always
    image: nginx:latest
    ports:
      - 443:443
      - 3001:80
      - 80:80
    networks:
      - project_net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/location.conf:/etc/nginx/location.conf
      - ./static:/etc/static
      - ./nginx/www:/etc/nginx/www
      - ./nginx/cert:/etc/nginx/cert
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '500m'
        max-file: '1'
  minio:
    image: minio/minio
    restart: always
    privileged: true
    ports:
      - 9000:9000
      - 9001:9001
    networks:
      - project_net
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=uj123456
    volumes:
      - ./production_data/minio:/data
      - ./production_data/share:/mnt/share/
    logging:
      driver: 'json-file'
      options:
        max-size: '500M'
        max-file: '1'
    command: server --console-address ':9001'  /data
  emqx:
    restart: always
    image: emqx/emqx:5.8.8
    ports:
      - 1883:1883
      - 8081:8081
      - 8083:8083
      - 8883:8883
      - 8084:8084
      - 18083:18083
    networks:
      - project_net
networks:
  project_net:
    external: true
    name: ${NETWORK_NAME}
