version: "3.8"

services:
  tsdb:
    image: timescale/timescaledb:2.8.0-pg14
    restart: always
    ports:
      - ${TSDB_PORT:-5432}:5432
    networks:
      - project_net
    environment:
      POSTGRES_PASSWORD: ${COMMON_PASSWORD:?COMMON_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./production_data/tsdb:/var/lib/postgresql/data/pgdata
      - ./production_data/share:/mnt/share/
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '500M'
        max-file: '1'
  redis:
    restart: always
    image: redis:6.2.6
    ports:
      - ${REDIS_PORT:-6379}:6379
    volumes:
      - ./production_data/redis/data:/data
    networks:
      - project_net
    command: redis-server --requirepass ${COMMON_PASSWORD:?COMMON_PASSWORD is required} --notify-keyspace-events Ex --appendonly yes --appendfsync everysec
  nginx:
    restart: always
    image: nginx:latest
    ports:
      - ${NGINX_HTTPS_PORT:-443}:443
      - ${NGINX_HTTP_ALT_PORT:-3001}:80
      - ${NGINX_HTTP_PORT:-80}:80
    networks:
      - project_net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/location.conf:/etc/nginx/location.conf
      - ./static:/etc/static
      - ./nginx/www:/etc/nginx/www
      - ./nginx/cert:/etc/nginx/cert
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: 'json-file'
      options:
        max-size: '500m'
        max-file: '1'
  minio:
    image: minio/minio:RELEASE.2024-10-29T16-01-48Z
    restart: always
    privileged: true
    ports:
      - ${MINIO_API_PORT:-9000}:9000
      - ${MINIO_CONSOLE_PORT:-9001}:9001
    networks:
      - project_net
    environment:
      - MINIO_ROOT_USER=minio
      - MINIO_ROOT_PASSWORD=${COMMON_PASSWORD:?COMMON_PASSWORD is required}
    volumes:
      - ./production_data/minio:/data
      - ./production_data/share:/mnt/share/
    logging:
      driver: 'json-file'
      options:
        max-size: '500M'
        max-file: '1'
    command: server --console-address ':9001'  /data
  emqx:
    restart: always
    image: emqx/emqx:5.8.8
    ports:
      - ${EMQX_MQTT_PORT:-1883}:1883
      - ${EMQX_HTTP_API_PORT:-8081}:8081
      - ${EMQX_WS_PORT:-8083}:8083
      - ${EMQX_SSL_MQTT_PORT:-8883}:8883
      - ${EMQX_WSS_PORT:-8084}:8084
      - ${EMQX_DASHBOARD_PORT:-18083}:18083
    networks:
      - project_net
  mongo:
    image: "mongo:latest"
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 500M
    logging:
      driver: "json-file"
      options:
        max-size: "200M"
        max-file: "1"
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${COMMON_PASSWORD:?COMMON_PASSWORD is required}
    volumes:
      - ./config/mongo:/etc/mongo
      - ./production_data/mongo:/data/db
    ports:
      - ${MONGO_PORT:-27017}:27017
    networks:
      - project_net
    command: mongod -f /etc/mongo/mongod.conf
networks:
  project_net:
    external: true
    name: ${NETWORK_NAME}
